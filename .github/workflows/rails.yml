name: Rails CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          USER_NAME: ${{ secrets.USER_NAME }}
          HOST_NAME: ${{ secrets.HOST_NAME }}
        run: |
          echo "$PRIVATE_KEY" > private_key
          chmod 600 private_key

          ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOST_NAME} << 'EOF'
            cd /home/ubuntu/worktrip-app
            git pull origin main
            ~/.rbenv/shims/bundle install
            RAILS_ENV=production ~/.rbenv/shims/bundle exec rails db:migrate
            RAILS_ENV=production ~/.rbenv/shims/bundle exec rails assets:precompile
            sudo systemctl restart puma
          EOF